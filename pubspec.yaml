name: cipherowl
description: CipherOwl Security - Smart Password Manager with Continuous Biometric Protection
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ─────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── Navigation ──────────────────────────────────────────
  go_router: ^14.2.7

  # ── Database (Local Encrypted) ──────────────────────────
  drift: ^2.20.2
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # ── Rust Bridge (Crypto + Biometric Core) ───────────────
  flutter_rust_bridge: ^2.3.0

  # ── Supabase (Cloud Backend) ─────────────────────────────
  supabase_flutter: ^2.5.9

  # ── Face Detection & Recognition ─────────────────────────
  google_mlkit_face_detection: ^0.11.0
  tflite_flutter: ^0.10.4

  # ── Biometric & Security ─────────────────────────────────
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # ── Animations ───────────────────────────────────────────
  rive: ^0.13.13
  lottie: ^3.1.2

  # ── Camera (Intruder Snapshot + Face Track) ──────────────
  camera: ^0.11.0+2
  image: ^4.2.0

  # ── Connectivity & Network ───────────────────────────────
  connectivity_plus: ^6.0.5
  dio: ^5.7.0
  http: ^1.2.2

  # ── Clipboard & Platform ─────────────────────────────────
  flutter_clipboard_manager: ^1.0.0+2
  share_plus: ^10.0.2
  url_launcher: ^6.3.1

  # ── Notifications ────────────────────────────────────────
  firebase_messaging: ^15.1.4
  flutter_local_notifications: ^17.2.3

  # ── UI Utilities ─────────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  auto_size_text: ^3.0.0
  fluttertoast: ^8.2.8

  # ── QR Code (TOTP Setup) ─────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # ── OTP/TOTP ─────────────────────────────────────────────
  otp: ^3.1.4

  # ── Password Generator / Strength ────────────────────────
  zxcvbn: ^1.0.0

  # ── Import / Export ──────────────────────────────────────
  csv: ^6.0.0
  file_picker: ^8.1.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Cryptography (Dart layer wrappers) ──────────────────
  pointycastle: ^3.9.1
  cryptography: ^2.7.0
  bip39: ^1.0.6

  # ── Utilities ────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.18.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.4.0
  package_info_plus: ^8.1.1
  device_info_plus: ^10.1.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/images/brands/
    - assets/icons/
    - assets/models/
    - assets/l10n/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
