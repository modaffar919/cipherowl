name: cipherowl
description: CipherOwl Security - Smart Password Manager with Continuous Biometric Protection
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ─────────────────────────────────────
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # ── Navigation ──────────────────────────────────────────
  go_router: ^17.1.0

  # ── Database (Local Encrypted) ──────────────────────────
  drift: ^2.20.2
  drift_flutter: ^0.3.0
  sqlcipher_flutter_libs: ^0.7.0+eol

  # ── Rust Bridge (Crypto + Biometric Core) ───────────────
  flutter_rust_bridge: ^2.3.0

  # ── Supabase (Cloud Backend) ─────────────────────────────
  supabase_flutter: ^2.5.9

  # ── Face Detection & Recognition ─────────────────────────
  google_mlkit_face_detection: ^0.13.2
  tflite_flutter: ^0.12.1

  # ── Biometric & Security ─────────────────────────────────
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0

  # ── Animations ───────────────────────────────────────────
  rive: ^0.14.4
  lottie: ^3.1.2

  # ── Camera (Intruder Snapshot + Face Track) ──────────────
  camera: ^0.12.0
  image: ^4.2.0

  # ── Connectivity & Network ───────────────────────────────
  connectivity_plus: ^7.0.0
  dio: ^5.7.0
  http: ^1.2.2

  # ── Clipboard & Platform ─────────────────────────────────
  
  share_plus: ^12.0.1
  url_launcher: ^6.3.1

  # ── Notifications ────────────────────────────────────────
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^20.1.0
  shared_preferences: ^2.3.3

  # ── UI Utilities ─────────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3
  auto_size_text: ^3.0.0
  fluttertoast: ^9.0.0

  # ── QR Code (TOTP Setup) ─────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # ── OTP/TOTP ─────────────────────────────────────────────
  otp: ^3.1.4

  # ── Password Generator / Strength ────────────────────────
  zxcvbn: ^1.0.0

  # ── Import / Export ──────────────────────────────────────
  csv: ^7.2.0
  file_picker: ^10.3.10
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Cryptography (Dart layer wrappers) ──────────────────
  pointycastle: ^3.9.1
  cryptography: ^2.7.0
  bip39: ^1.0.6

  # ── Utilities ────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.18.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  logger: ^2.4.0
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.2
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/images/brands/
    - assets/icons/
    - assets/models/
    - assets/l10n/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/cipherowl_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/logo/cipherowl_logo.png"
  web:
    generate: false

flutter_native_splash:
  color: "#0D1117"
  image: assets/logo/cipherowl_logo.png
  android: true
  ios: false
  android_12:
    image: assets/logo/cipherowl_logo.png
    color: "#0D1117"
    icon_background_color: "#0D1117"
