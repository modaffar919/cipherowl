<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320" />
  <link rel="stylesheet" href="popup.css" />
  <title>CipherOwl</title>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <div id="header">
    <div id="logo">
      <svg width="22" height="22" viewBox="0 0 100 100" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <ellipse cx="50" cy="55" rx="36" ry="32" fill="#0FF4C6" opacity="0.15"/>
        <circle cx="50" cy="50" r="42" stroke="#0FF4C6" stroke-width="4"/>
        <circle cx="36" cy="42" r="9" fill="#0FF4C6"/>
        <circle cx="64" cy="42" r="9" fill="#0FF4C6"/>
        <circle cx="36" cy="42" r="4" fill="#0a0e1a"/>
        <circle cx="64" cy="42" r="4" fill="#0a0e1a"/>
        <path d="M34 62 Q50 72 66 62" stroke="#0FF4C6" stroke-width="3"
              stroke-linecap="round" fill="none"/>
        <path d="M30 24 L50 10 L70 24" stroke="#0FF4C6" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>CipherOwl</span>
    </div>
    <div id="status-badge" class="badge badge-disconnected" title="غير متصل">●</div>
  </div>

  <!-- ── Loading ─────────────────────────────────────────────────────────── -->
  <div id="view-loading" class="view active">
    <div class="spinner"></div>
    <p>جاري التحميل…</p>
  </div>

  <!-- ── Auth View ────────────────────────────────────────────────────────── -->
  <div id="view-auth" class="view">
    <h2>تسجيل الدخول</h2>
    <p class="hint">سجّل الدخول بحسابك في CipherOwl</p>
    <div class="field">
      <label for="email">البريد الإلكتروني</label>
      <input type="email" id="email" autocomplete="email"
             placeholder="user@example.com" dir="ltr" />
    </div>
    <div class="field">
      <label for="password">كلمة المرور</label>
      <input type="password" id="password" autocomplete="current-password"
             dir="ltr" />
    </div>
    <button id="btn-login" class="btn btn-primary">
      <span id="btn-login-text">دخول</span>
      <span id="btn-login-spinner" class="btn-spinner hidden"></span>
    </button>
    <div id="auth-error" class="error-msg hidden"></div>
  </div>

  <!-- ── Key Import View ──────────────────────────────────────────────────── -->
  <div id="view-key" class="view">
    <h2>ربط الخزينة</h2>
    <p class="hint">
      من تطبيق CipherOwl، اذهب إلى<br />
      <strong>الإعدادات → ربط امتداد المتصفح</strong><br />
      وانسخ مفتاح الربط (64 حرفاً).
    </p>
    <div class="field">
      <label for="sync-key-input">مفتاح الربط</label>
      <textarea id="sync-key-input" rows="3" dir="ltr"
                placeholder="0a1b2c3d…"></textarea>
    </div>
    <button id="btn-import-key" class="btn btn-primary">ربط الخزينة</button>
    <div id="key-error" class="error-msg hidden"></div>
    <button id="btn-logout-from-key" class="btn btn-ghost">← تسجيل خروج</button>
  </div>

  <!-- ── Main View: Credential List ──────────────────────────────────────── -->
  <div id="view-main" class="view">
    <div id="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="search" placeholder="بحث في الخزينة…"
             autocomplete="off" />
    </div>

    <div id="domain-banner" class="domain-banner hidden">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="domain-banner-text"></span>
    </div>

    <div id="cred-list"></div>

    <div id="no-results" class="empty-state hidden">
      <span>🔍</span>
      <p>لا توجد نتائج</p>
    </div>

    <div id="empty-vault" class="empty-state hidden">
      <span>🔒</span>
      <p>الخزينة فارغة</p>
      <small>أضف بيانات تسجيل دخول من التطبيق أولاً</small>
    </div>

    <div id="main-footer">
      <button id="btn-refresh" class="btn-icon" title="تحديث">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button id="btn-lock" class="btn-icon" title="قفل">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </button>
      <button id="btn-logout" class="btn-icon" title="خروج">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
