name: CD — Android Release Build

on:
  push:
    tags:
      - "v*.*.*"        # e.g. v1.0.0, v1.2.3-beta
  workflow_dispatch:    # allow manual trigger from GitHub UI
    inputs:
      track:
        description: "Release track (internal / alpha / beta / production)"
        required: true
        default: internal

env:
  FLUTTER_VERSION: "3.27.4"
  JAVA_VERSION: "17"
  NDK_VERSION: "28.2.13676358"

jobs:
  # ── Build & Sign Android Release ────────────────────────────────────────────
  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java & Flutter ────────────────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Rust + cargo-ndk (required for native/smartvault_core) ────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/smartvault_core

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # ── Android NDK ────────────────────────────────────────────────────────
      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      # ── Build Rust libraries for Android ──────────────────────────────────
      - name: Build Rust (aarch64 + armv7)
        working-directory: native/smartvault_core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          cargo ndk -t aarch64-linux-android -t armv7-linux-androideabi \
            -o ../../android/app/src/main/jniLibs \
            build --release

      # ── Flutter dependencies ──────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Decode & write Android keystore ───────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/cipherowl-release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../cipherowl-release.jks
          EOF

      # ── Build APK (universal) ─────────────────────────────────────────────
      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      # ── Build AAB (Play Store) ────────────────────────────────────────────
      - name: Build AAB (release)
        run: flutter build appbundle --release

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: cipherowl-apks-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: cipherowl-aab-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
