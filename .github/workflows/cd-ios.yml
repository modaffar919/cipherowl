name: CD — iOS Release Build

on:
  push:
    tags:
      - "v*.*.*"            # e.g. v1.0.0, v1.2.3
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      distribute_to:
        description: "Distribution target (testflight / adhoc)"
        required: true
        default: testflight
        type: choice
        options:
          - testflight
          - adhoc

env:
  FLUTTER_VERSION: "3.27.4"

jobs:
  # ── Build & Sign iOS Release ─────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Flutter ──────────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Rust (required for flutter_rust_bridge / smartvault_core) ────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/smartvault_core

      # ── Build Rust libraries for iOS ─────────────────────────────────────────────
      - name: Build Rust (aarch64-apple-ios)
        working-directory: native/smartvault_core
        run: cargo build --release --target aarch64-apple-ios

      # ── Flutter dependencies ──────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Install Apple certificates and provisioning profile ───────────────────────
      - name: Install Apple certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Build iOS release (no codesign — Xcode cloud handles signing) ────────────
      - name: Build iOS (release)
        run: flutter build ios --release --no-codesign

      # ── Archive & export IPA ─────────────────────────────────────────────────────
      - name: Archive Xcode project
        env:
          EXPORT_METHOD: ${{ github.event.inputs.distribute_to == 'adhoc' && 'ad-hoc' || 'app-store' }}
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/cipherowl.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

          # Create export options plist
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/cipherowl.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

      # ── Upload IPA artifact ────────────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cipherowl-ios-${{ github.ref_name }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      # ── Upload to TestFlight ─────────────────────────────────────────────────────
      - name: Upload to TestFlight
        if: >
          github.event.inputs.distribute_to != 'adhoc' &&
          (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Decode App Store Connect API key
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$API_KEY_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$(find $RUNNER_TEMP/ipa -name '*.ipa' | head -1)" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --apiKeyPath "$API_KEY_PATH" \
            --verbose

      # ── Create GitHub Release (tags only) ────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ runner.temp }}/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup keychain ──────────────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
